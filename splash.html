<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSG Launcher lädt</title>
  <style>
    :root {
      --bg1: #05070d;
      --bg2: #0b1220;
      --line: rgba(255,255,255,0.08);
      --gold: #ffbf47;
      --orange: #ff7a18;
      --soft: rgba(255,255,255,0.75);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: transparent;
      display: block;
      user-select: none;
    }

    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,140,0,0.18), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(255,209,102,0.16), transparent 25%),
        linear-gradient(145deg, var(--bg2), var(--bg1));
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .shell::before, .shell::after {
      content: "";
      position: absolute;
      inset: -30%;
      pointer-events: none;
    }

    .shell::before {
      background: conic-gradient(from 180deg, transparent 0deg, rgba(255,255,255,0.06) 60deg, transparent 120deg, transparent 360deg);
      animation: rotateGlow 10s linear infinite;
    }

    .shell::after {
      background: repeating-linear-gradient(90deg, transparent 0 28px, rgba(255,255,255,0.025) 28px 29px);
      opacity: 0.4;
      mix-blend-mode: screen;
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 32px;
      text-align: center;
    }

    .logo-wrap {
      position: relative;
      width: 360px;
      animation: floatLogo 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 26px rgba(255,170,60,0.25)) drop-shadow(0 10px 26px rgba(0,0,0,0.4));
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -10% -14%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,166,77,0.28), transparent 60%);
      animation: pulse 2.6s ease-in-out infinite;
      z-index: 0;
    }

    .logo-light {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      border-radius: 16px;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .logo-light::before {
      content: "";
      position: absolute;
      top: -20%;
      left: -35%;
      width: 46%;
      height: 150%;
      transform: skewX(-24deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), rgba(255,239,184,0.95), rgba(255,255,255,0.08), transparent);
      filter: blur(4px);
      animation: sweep 2.8s ease-in-out infinite;
    }

    .logo {
      position: relative;
      z-index: 1;
      width: 100%;
      display: block;
    }

    h1 {
      margin: 10px 0 0;
      color: white;
      font-size: 42px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--soft);
      font-size: 20px;
      letter-spacing: 0.4px;
    }

    .bar {
      width: 420px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.45);
      margin-top: 6px;
    }

    .bar > span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--orange), var(--gold), #ffe6a7);
      box-shadow: 0 0 18px rgba(255,191,71,0.45);
      animation: loading 1.4s ease-in-out infinite;
    }

    .hint {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    @keyframes sweep {
      0% { left: -45%; opacity: 0; }
      15% { opacity: 1; }
      55% { opacity: 1; }
      100% { left: 135%; opacity: 0; }
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(0.96); opacity: 0.55; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    @keyframes loading {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(330%); }
    }
    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="content">
      <div class="logo-wrap">
        <img class="logo" src="assets/brand.png" alt="FSG Logo" />
        <div class="logo-light"></div>
      </div>
      <h1>FSG Launcher</h1>
      <p>Launcher wird vorbereitet…</p>
      <div class="bar"><span></span></div>
    </div>
    <div class="hint">Fireside Gaming</div>
  </div>
</body>
</html>
